# Enable logging
CONFIG_PRINTK=y
CONFIG_GPIO=y
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=4

# UART config
#CONFIG_UART_CONSOLE=y
#CONFIG_LOG_BACKEND_UART=y

# RTT config
CONFIG_UART_CONSOLE=n
CONFIG_RTT_CONSOLE=y
CONFIG_USE_SEGGER_RTT=y

CONFIG_I2C=y
CONFIG_SENSOR=y
CONFIG_IRNAS_LIS2DW12=y
CONFIG_IRNAS_LIS2DW12_TRIGGER_GLOBAL_THREAD=y
#CONFIG_IRNAS_LIS2DW12_FREE_FALL=y
#CONFIG_IRNAS_LIS2DW12_TAP=y
CONFIG_IRNAS_LIS2DW12_MOTION_DETECTION=y
CONFIG_SENSOR_LOG_LEVEL_DBG=y
