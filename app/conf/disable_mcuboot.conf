# DFU
# Enable mcumgr management library
CONFIG_MCUMGR=n
# Enable image and os management
CONFIG_MCUMGR_CMD_IMG_MGMT=n
CONFIG_MCUMGR_CMD_OS_MGMT=n

# Disable MCUBoot - overrides values in default.conf
# NOTE: Logs will be disabled
CONFIG_BOOTLOADER_MCUBOOT=n

CONFIG_IMG_MANAGER=n
CONFIG_MCUBOOT_IMG_MANAGER=n
CONFIG_MCUBOOT_SHELL=n
CONFIG_PM_EXTERNAL_FLASH_MCUBOOT_SECONDARY=n
# CONFIG_MCUBOOT_BOOTLOADER_MODE_OVERWRITE_ONLY=n
