#I2C
CONFIG_I2C=y
CONFIG_I2C_NRFX=y

# MIC t838
CONFIG_AUDIO=y
CONFIG_AUDIO_DMIC=y
CONFIG_AUDIO_DMIC_NRFX_PDM=n

# Satellite module
CONFIG_SATELLITE=y

# Fence module
CONFIG_FENCE_PORT=y
# Fence port with external switch support
CONFIG_ADC=y
CONFIG_ADC_NRFX_SAADC=y
CONFIG_MULTITHREADING=y

# RF front end module
CONFIG_RF_FRONT_END_MODULE=y

# LR s-band
CONFIG_LR_S_BAND=y

# Flash chip
CONFIG_SPI_NOR_SFDP_RUNTIME=y
CONFIG_SPI_NOR_FLASH_LAYOUT_PAGE_SIZE=4096
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_JESD216_API=y

CONFIG_SPI_NOR_IDLE_IN_DPD=y
