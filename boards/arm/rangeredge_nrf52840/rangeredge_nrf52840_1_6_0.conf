#I2C
CONFIG_I2C=y
CONFIG_I2C_NRFX=y

# MIC VM3011
CONFIG_MIC_VM3011_PDM=y
CONFIG_VM3011=y
CONFIG_VM3011_INT=y
CONFIG_VM3011_PDM_BUFFER_SIZE=8000
CONFIG_VM3011_MONO=y

# Satellite module
CONFIG_SATELLITE=y

# Fence module
CONFIG_FENCE_PORT=y
# Fence port with external switch support
CONFIG_ADC=y
CONFIG_ADC_NRFX_SAADC=y
CONFIG_MULTITHREADING=y
